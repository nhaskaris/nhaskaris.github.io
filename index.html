<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nick Haskaris</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="data:," />

  <style>
    :root {
      --neon-green: #00ff66;
      --neon-blue: #00e5ff;
      --neon-purple: #b400ff;
      --dark-bg: #050508;
      --card-bg: rgba(15, 15, 20, 0.92);
      --border-color: #1a1a26;
      --text-dim: #6a6a85;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--dark-bg);
      background-image: radial-gradient(circle at center, #0f0f1b 0%, #050508 100%);
      overflow: hidden;
      font-family: "Share Tech Mono", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 18px;
    }

    /* ---------- Title header ---------- */
    .site-title {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 6px;
      color: #f4f4fa;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(0, 229, 255, 0.55),
        0 0 22px rgba(0, 229, 255, 0.25);
      margin: 0;
    }

    .site-title span {
      color: var(--neon-blue);
    }

    /* ---------- Game frame ---------- */
    .frame-wrap {
      position: relative;
      border-radius: 14px;
      padding: 2px;
      background: linear-gradient(
        135deg,
        rgba(0, 229, 255, 0.35),
        rgba(180, 0, 255, 0.25),
        rgba(0, 255, 102, 0.25)
      );
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
    }

    canvas {
      display: block;
      border-radius: 12px;
      background-color: var(--dark-bg);
    }

    /* CRT scanline overlay, purely decorative */
    .scanlines {
      pointer-events: none;
      position: absolute;
      inset: 2px;
      border-radius: 12px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035) 0px,
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
    }

    .scanlines::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      box-shadow: inset 0 0 90px rgba(0, 0, 0, 0.75);
    }

    /* ---------- Modal ---------- */
    .modal {
      display: none;
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background-color: var(--card-bg);
      backdrop-filter: blur(15px);
      -webkit-backdrop-filter: blur(15px);
      color: #f1f1f4;
      border: 2px solid var(--border-color);
      padding: 40px;
      z-index: 100;
      box-shadow: 0px 10px 60px rgba(0, 0, 0, 0.95);
      text-align: center;
      border-radius: 16px;
      min-width: 360px;
      max-width: 500px;
      animation: modalFadeIn 0.3s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
        transform: translate(-50%, -40%);
      }
      to {
        opacity: 1;
        transform: translate(-50%, -50%);
      }
    }

    .modal h2 {
      margin-top: 0;
      font-family: "Orbitron", sans-serif;
      font-size: 1.7rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    .modal p {
      font-size: 1.05rem;
      line-height: 1.65;
      color: #cbd5e1;
    }

    .modal button {
      background-color: transparent;
      border: 2px solid white;
      color: white;
      padding: 12px 24px;
      font-size: 1rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      margin-top: 25px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.25s ease;
    }

    .modal button:hover,
    .modal button:focus-visible {
      background-color: white;
      color: #0a0a0c;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      outline: none;
    }

    .construction-tag {
      display: inline-block;
      background-color: rgba(241, 196, 15, 0.1);
      border: 1px dashed #f1c40f;
      color: #f1c40f;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 15px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }

    .footer-hint {
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 1.5px;
    }

    @media (prefers-reduced-motion: reduce) {
      .construction-tag {
        animation: none;
      }
    }
  </style>

  <script src="https://unpkg.com/kaplay@3001.0.12/dist/kaplay.js" crossorigin="anonymous"></script>
</head>
<body>
  <h1 class="site-title">NICK <span>HASKARIS</span></h1>

  <div class="frame-wrap" id="frame-wrap">
    <div class="scanlines"></div>
  </div>

  <div class="footer-hint">PORTFOLIO 3D ALPHA &mdash; USE ARROWS / A·D TO AIM, SPACE TO ENTER</div>

  <!-- Portal content modal -->
  <div id="modal" class="modal">
    <h2 id="modal-title">Portal</h2>
    <div class="construction-tag">🚧 UNDER CONSTRUCTION 🚧</div>
    <p id="modal-text">Content is being assembled...</p>
    <button onclick="closeModal()">Close Door [SPACE]</button>
  </div>

  <script>
    // ---------------------------------------------------------------
    // Setup
    // ---------------------------------------------------------------
    const k = kaplay({
      width: 800,
      height: 600,
      background: "#050508",
      letterbox: true,
    });

    // kaplay appends its own canvas to <body> — move it into our styled
    // frame so the gradient border / scanline overlay sit around it.
    const frameWrap = document.getElementById("frame-wrap");
    const gameCanvas = document.querySelector("canvas");
    if (gameCanvas) {
      frameWrap.insertBefore(gameCanvas, frameWrap.firstChild);
    }

    const DOORS = [
      {
        id: 0,
        title: "WORK HISTORY",
        x: 220,
        y: 260,
        w: 90,
        h: 180,
        color: k.rgb(0, 229, 255),
        classColor: "#00e5ff",
        desc: "Welcome to the career log! This portal will soon compile a list of jobs held, leadership XP earned, and dynamic developer stats.",
      },
      {
        id: 1,
        title: "PROJECTS",
        x: 400,
        y: 260,
        w: 110,
        h: 200,
        color: k.rgb(180, 0, 255),
        classColor: "#b400ff",
        desc: "Inside this hub live standard-shattering builds, active GitHub repos, and direct live links to live web designs.",
      },
      {
        id: 2,
        title: "CONTACT INFO",
        x: 580,
        y: 260,
        w: 90,
        h: 180,
        color: k.rgb(0, 255, 102),
        classColor: "#00ff66",
        desc: "Want to start a co-op quest? Dispatch an email or interface directly via LinkedIn and socials. Options will appear here shortly.",
      },
    ];

    const HORIZON_Y = 260;
    const SCALE_SELECTED = 1.15;
    const SCALE_IDLE = 1.0;
    const SCALE_LERP_SPEED = 10; // higher = snappier

    k.scene("main", () => {
      let selectedIndex = 1; // default: middle "Projects" door
      let modalActive = false;
      let canInput = true; // guards against double-trigger on space keyup

      // current animated scale per door, eased toward its target each frame
      const doorScale = DOORS.map((d) => (d.id === selectedIndex ? SCALE_SELECTED : SCALE_IDLE));

      let gridOffset = 0;

      // -------------------------------------------------------------
      // Static instructions text
      // -------------------------------------------------------------
      k.add([
        k.text("USE LEFT/RIGHT ARROWS TO AIM  //  PRESS SPACE TO OPEN DOOR", { size: 13 }),
        k.pos(k.width() / 2, 40),
        k.anchor("center"),
        k.color(90, 90, 115),
      ]);

      // -------------------------------------------------------------
      // Audio: short synth blip on navigation
      // -------------------------------------------------------------
      function playBeep(freq = 400) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, ctx.currentTime);

          gain.gain.setValueAtTime(0.04, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } catch (e) {
          // Ignore — browser may block audio context before user gesture
        }
      }

      // -------------------------------------------------------------
      // Render loop: pseudo-3D hallway, floor grid, and doors
      // -------------------------------------------------------------
      k.onDraw(() => {
        const screenW = k.width();
        const screenH = k.height();
        const dt = k.dt();

        drawHorizon(screenW);
        drawAmbientFan(screenW, screenH);
        drawRoadLanes(screenW, screenH);
        drawFloorScanlines(screenW, screenH, dt);
        drawHallwayFraming(screenW);
        drawDoors(dt);
      });

      function drawHorizon(screenW) {
        k.drawLine({
          p1: k.vec2(0, HORIZON_Y),
          p2: k.vec2(screenW, HORIZON_Y),
          color: k.rgb(15, 15, 25),
          width: 2,
        });
      }

      // Faint background texture radiating from the vanishing point — kept
      // subtle so the three road lanes read as the main structure.
      function drawAmbientFan(screenW, screenH) {
        const numFloorLines = 10;
        for (let i = 0; i <= numFloorLines; i++) {
          const progress = i / numFloorLines;
          const startX = k.lerp(-400, screenW + 400, progress);
          k.drawLine({
            p1: k.vec2(400, HORIZON_Y),
            p2: k.vec2(startX, screenH),
            color: k.rgb(12, 12, 22),
            width: 1,
          });
        }
      }

      // The road forks into three lanes right at the vanishing point, one
      // leading to each door. Each lane is built from several fanned lines
      // (for a soft "filled path" look) plus two brighter edge lines.
      const VANISH = k.vec2(400, HORIZON_Y);
      const LANE_HALF_WIDTH = 55;
      const LANE_DIVERGE = 2.35; // how far the lanes spread apart by the bottom of the screen

      function drawRoadLanes(screenW, screenH) {
        DOORS.forEach((door) => {
          const isSelected = door.id === selectedIndex;
          const offset = door.x - VANISH.x;
          const bottomCenterX = VANISH.x + offset * LANE_DIVERGE;
          const leftX = bottomCenterX - LANE_HALF_WIDTH;
          const rightX = bottomCenterX + LANE_HALF_WIDTH;

          const fillColor = isSelected ? door.color : k.rgb(30, 30, 42);
          const fillOpacity = isSelected ? 0.1 : 0.05;
          const edgeColor = isSelected ? door.color : k.rgb(45, 45, 62);
          const edgeWidth = isSelected ? 2.5 : 1.5;
          const edgeOpacity = isSelected ? 0.85 : 0.4;

          // soft fill: several thin lines fanned across the lane width
          const fillLines = 7;
          for (let i = 0; i <= fillLines; i++) {
            const t = i / fillLines;
            const bottomX = k.lerp(leftX, rightX, t);
            k.drawLine({
              p1: VANISH,
              p2: k.vec2(bottomX, screenH),
              color: fillColor,
              width: 1,
              opacity: fillOpacity,
            });
          }

          // crisp edges so each lane clearly reads as its own path
          k.drawLine({ p1: VANISH, p2: k.vec2(leftX, screenH), color: edgeColor, width: edgeWidth, opacity: edgeOpacity });
          k.drawLine({ p1: VANISH, p2: k.vec2(rightX, screenH), color: edgeColor, width: edgeWidth, opacity: edgeOpacity });
        });
      }

      function drawFloorScanlines(screenW, screenH, dt) {
        gridOffset = (gridOffset + dt * 24) % 40;

        for (let j = 0; j < 12; j++) {
          // exponential scaling creates the illusion of receding depth
          const ratio = Math.pow((j + gridOffset / 40) / 12, 3);
          const y = HORIZON_Y + ratio * (screenH - HORIZON_Y);
          const alpha = Math.floor(ratio * 70);

          k.drawLine({
            p1: k.vec2(0, y),
            p2: k.vec2(screenW, y),
            color: k.rgb(alpha, alpha, alpha + 30),
            width: 1,
          });
        }
      }

      function drawHallwayFraming(screenW) {
        k.drawLine({ p1: k.vec2(0, 0), p2: k.vec2(150, HORIZON_Y), color: k.rgb(25, 25, 40), width: 2 });
        k.drawLine({
          p1: k.vec2(screenW, 0),
          p2: k.vec2(screenW - 150, HORIZON_Y),
          color: k.rgb(25, 25, 40),
          width: 2,
        });
      }

      function drawDoors(dt) {
        DOORS.forEach((door) => {
          const isSelected = door.id === selectedIndex;
          const target = isSelected ? SCALE_SELECTED : SCALE_IDLE;

          // smoothly ease current scale toward its target instead of snapping
          doorScale[door.id] = k.lerp(doorScale[door.id], target, Math.min(1, dt * SCALE_LERP_SPEED));

          const scale = doorScale[door.id];
          const activeW = door.w * scale;
          const activeH = door.h * scale;

          // glow panel behind the door
          k.drawRect({
            width: activeW,
            height: activeH,
            pos: k.vec2(door.x, door.y),
            anchor: "bot",
            color: isSelected ? door.color : k.rgb(10, 10, 15),
            opacity: isSelected ? 0.08 : 0.02,
          });

          // door outline
          k.drawRect({
            width: activeW,
            height: activeH,
            pos: k.vec2(door.x, door.y),
            anchor: "bot",
            fill: false,
            outline: {
              color: isSelected ? door.color : k.rgb(40, 40, 55),
              width: isSelected ? 4 : 2,
            },
          });

          // door handle
          k.drawCircle({
            pos: k.vec2(door.x + activeW / 2.8, door.y - activeH / 2),
            radius: isSelected ? 4 : 3,
            color: isSelected ? door.color : k.rgb(50, 50, 60),
          });

          // label
          if (isSelected) {
            k.drawText({
              text: `[ ${door.title} ]`,
              pos: k.vec2(door.x, door.y - activeH - 25),
              anchor: "center",
              size: 16,
              color: door.color,
            });

            const bounce = Math.sin(k.time() * 8) * 5;
            k.drawText({
              text: "▼",
              pos: k.vec2(door.x, door.y - activeH - 45 + bounce),
              anchor: "center",
              size: 14,
              color: door.color,
            });
          } else {
            k.drawText({
              text: door.title,
              pos: k.vec2(door.x, door.y - activeH - 15),
              anchor: "center",
              size: 11,
              color: k.rgb(100, 100, 120),
            });
          }
        });
      }

      // -------------------------------------------------------------
      // Input: navigation
      // -------------------------------------------------------------
      function selectPrev() {
        if (modalActive || !canInput) return;
        selectedIndex = (selectedIndex - 1 + DOORS.length) % DOORS.length;
        playBeep();
      }

      function selectNext() {
        if (modalActive || !canInput) return;
        selectedIndex = (selectedIndex + 1) % DOORS.length;
        playBeep();
      }

      k.onKeyPress("left", selectPrev);
      k.onKeyPress("a", selectPrev);
      k.onKeyPress("right", selectNext);
      k.onKeyPress("d", selectNext);

      // -------------------------------------------------------------
      // Input: open door / modal
      // -------------------------------------------------------------
      function openDoor() {
        if (!canInput) return;
        const currentDoor = DOORS[selectedIndex];
        modalActive = true;
        playBeep(600);

        const modal = document.getElementById("modal");
        const titleNode = document.getElementById("modal-title");

        titleNode.innerText = currentDoor.title;
        titleNode.style.color = currentDoor.classColor;
        titleNode.style.textShadow = `0 0 15px ${currentDoor.classColor}`;

        document.getElementById("modal-text").innerText = currentDoor.desc;

        const btn = modal.querySelector("button");
        btn.style.borderColor = currentDoor.classColor;
        btn.style.color = currentDoor.classColor;

        btn.onmouseenter = () => {
          btn.style.backgroundColor = currentDoor.classColor;
          btn.style.color = "#050508";
        };
        btn.onmouseleave = () => {
          btn.style.backgroundColor = "transparent";
          btn.style.color = currentDoor.classColor;
        };

        modal.style.display = "block";
      }

      k.onKeyPress("space", () => {
        if (!modalActive && canInput) openDoor();
      });

      // globally accessible so the modal's close button can reach it
      window.closeModal = function () {
        document.getElementById("modal").style.display = "none";
        modalActive = false;
        canInput = false;

        // brief lockout to prevent the same spacebar press re-opening a door
        setTimeout(() => {
          canInput = true;
        }, 150);
      };

      window.addEventListener("keydown", (e) => {
        if (!modalActive) return;
        if (e.key === " " || e.code === "Space" || e.key === "Escape") {
          e.preventDefault();
          closeModal();
        }
      });
    });

    k.go("main");
  </script>
</body>
</html>
