<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nick Haskaris</title>

  <link
    href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@500;700;900&display=swap"
    rel="stylesheet"
  />
  <link rel="icon" href="data:," />

  <style>
    :root {
      --neon-green: #00ff66;
      --neon-blue: #00e5ff;
      --neon-purple: #b400ff;
      --dark-bg: #050508;
      --card-bg: rgba(15, 15, 20, 0.92);
      --border-color: #1a1a26;
      --text-dim: #6a6a85;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      background-color: var(--dark-bg);
      background-image: radial-gradient(circle at center, #0f0f1b 0%, #050508 100%);
      overflow: hidden;
      font-family: "Share Tech Mono", monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 18px;
    }

    /* ---------- Title header ---------- */
    .site-title {
      font-family: "Orbitron", sans-serif;
      font-weight: 900;
      font-size: clamp(1.4rem, 3vw, 2.2rem);
      letter-spacing: 6px;
      color: #f4f4fa;
      text-transform: uppercase;
      text-shadow:
        0 0 8px rgba(0, 229, 255, 0.55),
        0 0 22px rgba(0, 229, 255, 0.25);
      margin: 0;
    }

    .site-title span {
      color: var(--neon-blue);
    }

    /* ---------- Game frame ---------- */
    .frame-wrap {
      position: relative;
      border-radius: 14px;
      padding: 2px;
      background: linear-gradient(
        135deg,
        rgba(0, 229, 255, 0.35),
        rgba(180, 0, 255, 0.25),
        rgba(0, 255, 102, 0.25)
      );
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.85);
    }

    canvas {
      display: block;
      border-radius: 12px;
      background-color: var(--dark-bg);
    }

    /* CRT scanline overlay, purely decorative */
    .scanlines {
      pointer-events: none;
      position: absolute;
      inset: 2px;
      border-radius: 12px;
      background: repeating-linear-gradient(
        to bottom,
        rgba(255, 255, 255, 0.035) 0px,
        rgba(255, 255, 255, 0.035) 1px,
        transparent 1px,
        transparent 3px
      );
      mix-blend-mode: overlay;
    }

    .scanlines::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 12px;
      box-shadow: inset 0 0 90px rgba(0, 0, 0, 0.75);
    }

    /* ---------- Door-transition flash ---------- */
    .room-flash {
      pointer-events: none;
      position: fixed;
      inset: 0;
      z-index: 150;
      opacity: 0;
      background: var(--neon-blue);
      transition: opacity 0.16s ease;
    }

    /* ---------- Room panel (replaces the old small modal) ---------- */
    .room-panel {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 100;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at center, rgba(20, 20, 30, 0.4) 0%, rgba(3, 3, 6, 0.96) 70%),
        var(--dark-bg);
    }

    .room-panel.room-panel--visible {
      display: flex;
      animation: roomFadeIn 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    @keyframes roomFadeIn {
      from {
        opacity: 0;
      }
      to {
        opacity: 1;
      }
    }

    .room-panel-inner {
      text-align: center;
      max-width: 560px;
      padding: 20px;
    }

    .room-icon {
      font-size: 3.2rem;
      margin-bottom: 6px;
      filter: drop-shadow(0 0 18px currentColor);
    }

    .room-panel h2 {
      margin: 0 0 6px;
      font-family: "Orbitron", sans-serif;
      font-size: 2.1rem;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .room-panel p {
      font-size: 1.1rem;
      line-height: 1.7;
      color: #cbd5e1;
    }

    .room-panel button {
      background-color: transparent;
      border: 2px solid white;
      color: white;
      padding: 12px 26px;
      font-size: 1rem;
      font-weight: bold;
      font-family: inherit;
      cursor: pointer;
      margin-top: 25px;
      border-radius: 6px;
      text-transform: uppercase;
      letter-spacing: 1px;
      transition: all 0.25s ease;
    }

    .room-panel button:hover,
    .room-panel button:focus-visible {
      background-color: white;
      color: #0a0a0c;
      box-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
      outline: none;
    }

    .construction-tag {
      display: inline-block;
      background-color: rgba(241, 196, 15, 0.1);
      border: 1px dashed #f1c40f;
      color: #f1c40f;
      padding: 4px 12px;
      border-radius: 4px;
      font-size: 0.9rem;
      margin-bottom: 15px;
      animation: pulse 1.5s infinite ease-in-out;
    }

    @keyframes pulse {
      0%,
      100% {
        opacity: 1;
      }
      50% {
        opacity: 0.6;
      }
    }

    .footer-hint {
      font-size: 0.85rem;
      color: var(--text-dim);
      letter-spacing: 1.5px;
    }

    @media (prefers-reduced-motion: reduce) {
      .construction-tag {
        animation: none;
      }
      .room-panel.room-panel--visible {
        animation: none;
      }
      .room-flash {
        transition: none;
      }
    }
  </style>

  <script src="https://unpkg.com/kaplay@3001.0.12/dist/kaplay.js" crossorigin="anonymous"></script>
</head>
<body>
  <h1 class="site-title">NICK <span>HASKARIS</span></h1>

  <div class="frame-wrap" id="frame-wrap">
    <div class="scanlines"></div>
  </div>

  <div class="footer-hint">PORTFOLIO 3D ALPHA &mdash; USE ARROWS / A·D TO AIM, SPACE TO ENTER</div>

  <!-- Flash overlay for the moment you step through a door -->
  <div id="room-flash" class="room-flash"></div>

  <!-- Themed 'room' you arrive in after walking through a door -->
  <div id="room-panel" class="room-panel">
    <div class="room-panel-inner">
      <div class="room-icon" id="room-icon">🚪</div>
      <h2 id="room-title">Room</h2>
      <div class="construction-tag">🚧 UNDER CONSTRUCTION 🚧</div>
      <p id="room-text">Content is being assembled...</p>
      <button id="room-back-btn" onclick="closeRoom()">Walk Back [SPACE]</button>
    </div>
  </div>

  <script>
    const k = kaplay({
      width: 800,
      height: 600,
      background: "#050508",
      letterbox: true,
    });

    const frameWrap = document.getElementById("frame-wrap");
    const gameCanvas = document.querySelector("canvas");
    if (gameCanvas) {
      frameWrap.insertBefore(gameCanvas, frameWrap.firstChild);
    }

    const DOORS = [
      {
        id: 0,
        title: "WORK HISTORY",
        x: 220,
        y: 260,
        w: 90,
        h: 180,
        color: k.rgb(0, 229, 255),
        classColor: "#00e5ff",
        icon: "💼",
        desc: "Welcome to the career log! This portal will soon compile a list of jobs held, leadership XP earned, and dynamic developer stats.",
      },
      {
        id: 1,
        title: "PROJECTS",
        x: 400,
        y: 260,
        w: 110,
        h: 200,
        color: k.rgb(180, 0, 255),
        classColor: "#b400ff",
        icon: "🗂️",
        desc: "Inside this hub live standard-shattering builds, active GitHub repos, and direct live links to live web designs.",
      },
      {
        id: 2,
        title: "CONTACT INFO",
        x: 580,
        y: 260,
        w: 90,
        h: 180,
        color: k.rgb(0, 255, 102),
        classColor: "#00ff66",
        icon: "✉️",
        desc: "Want to start a co-op quest? Dispatch an email or interface directly via LinkedIn and socials. Options will appear here shortly.",
      },
    ];

    const HORIZON_Y = 260;
    const SCALE_SELECTED = 1.15;
    const SCALE_IDLE = 1.0;
    const SCALE_LERP_SPEED = 10;

    const CAM_DEFAULT_POS = k.vec2(400, 300);
    const CAM_DEFAULT_SCALE = 1;
    const CAM_ZOOM_SCALE = 5;
    
    // Split transition timings
    const DOOR_OPEN_DURATION = 0.45;  // seconds to slide open/shut
    const CAM_ZOOM_DURATION = 0.55;   // seconds to zoom in/out

    function easeInOutCubic(x) {
      return x < 0.5 ? 4 * x * x * x : 1 - Math.pow(-2 * x + 2, 3) / 2;
    }

    k.scene("main", () => {
      let selectedIndex = 1;

      // doorState: "idle" | "opening" | "zooming-in" | "room" | "zooming-out" | "closing"
      let doorState = "idle";
      let canInput = true; 

      // Interactive sliding doors progress (0 = fully closed, 1 = fully open)
      let doorOpenProgress = 0;

      // Camera state variables
      let transitionT = 0;
      let camFrom = CAM_DEFAULT_POS;
      let camTo = CAM_DEFAULT_POS;
      let scaleFrom = CAM_DEFAULT_SCALE;
      let scaleTo = CAM_DEFAULT_SCALE;

      k.camPos(CAM_DEFAULT_POS);
      k.camScale(CAM_DEFAULT_SCALE, CAM_DEFAULT_SCALE);

      const doorScale = DOORS.map((d) => (d.id === selectedIndex ? SCALE_SELECTED : SCALE_IDLE));
      let gridOffset = 0;

      function playBeep(freq = 400) {
        try {
          const ctx = new (window.AudioContext || window.webkitAudioContext)();
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();

          osc.type = "sine";
          osc.frequency.setValueAtTime(freq, ctx.currentTime);

          gain.gain.setValueAtTime(0.04, ctx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.1);

          osc.connect(gain);
          gain.connect(ctx.destination);

          osc.start();
          osc.stop(ctx.currentTime + 0.1);
        } catch (e) {}
      }

      k.onDraw(() => {
        const screenW = k.width();
        const screenH = k.height();
        const dt = k.dt();

        drawHorizon(screenW);
        drawAmbientFan(screenW, screenH);
        drawRoadLanes(screenW, screenH);
        drawFloorScanlines(screenW, screenH, dt);
        drawHallwayFraming(screenW);
        drawDoors(dt);
      });

      function flash(color) {
        const el = document.getElementById("room-flash");
        el.style.background = color;
        el.style.opacity = "0.85";
        requestAnimationFrame(() => {
          setTimeout(() => {
            el.style.opacity = "0";
          }, 70);
        });
      }

      function showRoomPanel(door) {
        document.getElementById("room-icon").innerText = door.icon;
        document.getElementById("room-icon").style.color = door.classColor;

        const titleNode = document.getElementById("room-title");
        titleNode.innerText = door.title;
        titleNode.style.color = door.classColor;
        titleNode.style.textShadow = `0 0 18px ${door.classColor}`;

        document.getElementById("room-text").innerText = door.desc;

        const btn = document.getElementById("room-back-btn");
        btn.style.borderColor = door.classColor;
        btn.style.color = door.classColor;
        btn.onmouseenter = () => {
          btn.style.backgroundColor = door.classColor;
          btn.style.color = "#050508";
        };
        btn.onmouseleave = () => {
          btn.style.backgroundColor = "transparent";
          btn.style.color = door.classColor;
        };

        document.getElementById("room-panel").classList.add("room-panel--visible");
      }

      function hideRoomPanel() {
        document.getElementById("room-panel").classList.remove("room-panel--visible");
      }

      // State controllers
      function startDoorOpening() {
        doorState = "opening";
        transitionT = 0;
        playBeep(450);
      }

      function startZoomIn() {
        const door = DOORS[selectedIndex];
        doorState = "zooming-in";
        transitionT = 0;
        camFrom = CAM_DEFAULT_POS;
        camTo = k.vec2(door.x, HORIZON_Y + 10);
        scaleFrom = CAM_DEFAULT_SCALE;
        scaleTo = CAM_ZOOM_SCALE;
        playBeep(600);
      }

      function startZoomOut() {
        const door = DOORS[selectedIndex];
        hideRoomPanel();
        doorState = "zooming-out";
        transitionT = 0;
        camFrom = k.vec2(door.x, HORIZON_Y + 10);
        camTo = CAM_DEFAULT_POS;
        scaleFrom = CAM_ZOOM_SCALE;
        scaleTo = CAM_DEFAULT_SCALE;
        flash(door.classColor);
        playBeep(300);
      }

      function startDoorClosing() {
        doorState = "closing";
        transitionT = 0;
        playBeep(350);
      }

      k.onUpdate(() => {
        const dt = k.dt();

        // 1. Sliding Open State
        if (doorState === "opening") {
          transitionT = Math.min(1, transitionT + dt / DOOR_OPEN_DURATION);
          doorOpenProgress = easeInOutCubic(transitionT);
          
          if (transitionT >= 1) {
            doorOpenProgress = 1;
            startZoomIn();
          }
        }

        // 2. Camera Diving In State
        else if (doorState === "zooming-in") {
          transitionT = Math.min(1, transitionT + dt / CAM_ZOOM_DURATION);
          const eased = easeInOutCubic(transitionT);
          const pos = k.lerp(camFrom, camTo, eased);
          const scale = k.lerp(scaleFrom, scaleTo, eased);
          k.camPos(pos);
          k.camScale(scale, scale);

          if (transitionT >= 1) {
            doorState = "room";
            flash(DOORS[selectedIndex].classColor);
            showRoomPanel(DOORS[selectedIndex]);
          }
        }

        // 3. Camera Extracting Out State
        else if (doorState === "zooming-out") {
          transitionT = Math.min(1, transitionT + dt / CAM_ZOOM_DURATION);
          const eased = easeInOutCubic(transitionT);
          const pos = k.lerp(camFrom, camTo, eased);
          const scale = k.lerp(scaleFrom, scaleTo, eased);
          k.camPos(pos);
          k.camScale(scale, scale);

          if (transitionT >= 1) {
            k.camPos(CAM_DEFAULT_POS);
            k.camScale(CAM_DEFAULT_SCALE, CAM_DEFAULT_SCALE);
            startDoorClosing();
          }
        }

        // 4. Sliding Shut State
        else if (doorState === "closing") {
          transitionT = Math.min(1, transitionT + dt / DOOR_OPEN_DURATION);
          doorOpenProgress = 1 - easeInOutCubic(transitionT);

          if (transitionT >= 1) {
            doorOpenProgress = 0;
            doorState = "idle";
            canInput = false;
            setTimeout(() => {
              canInput = true;
            }, 150);
          }
        }
      });

      function drawHorizon(screenW) {
        k.drawLine({
          p1: k.vec2(0, HORIZON_Y),
          p2: k.vec2(screenW, HORIZON_Y),
          color: k.rgb(15, 15, 25),
          width: 2,
        });
      }

      function drawAmbientFan(screenW, screenH) {
        const numFloorLines = 10;
        for (let i = 0; i <= numFloorLines; i++) {
          const progress = i / numFloorLines;
          const startX = k.lerp(-400, screenW + 400, progress);
          k.drawLine({
            p1: k.vec2(400, HORIZON_Y),
            p2: k.vec2(startX, screenH),
            color: k.rgb(12, 12, 22),
            width: 1,
          });
        }
      }

      const LANE_HALF_WIDTH = 55;
      const LANE_DIVERGE = 2.35; 
      const ROAD_STEPS = 26; 

      function drawRoadLanes(screenW, screenH) {
        DOORS.forEach((door) => {
          const isSelected = door.id === selectedIndex;
          const apexX = door.x; 
          const offset = door.x - 400; 
          const bottomCenterX = 400 + offset * LANE_DIVERGE;

          const surfaceColor = isSelected ? door.color : k.rgb(28, 28, 40);
          const edgeColor = isSelected ? door.color : k.rgb(50, 50, 68);
          const edgeWidth = isSelected ? 3 : 1.5;
          const edgeOpacity = isSelected ? 0.9 : 0.35;

          for (let i = 0; i < ROAD_STEPS; i++) {
            const t0 = i / ROAD_STEPS;
            const t1 = (i + 1) / ROAD_STEPS;
            const e0 = Math.pow(t0, 1.6);
            const e1 = Math.pow(t1, 1.6);

            const y0 = k.lerp(HORIZON_Y, screenH, e0);
            const y1 = k.lerp(HORIZON_Y, screenH, e1);
            const cx0 = k.lerp(apexX, bottomCenterX, e0);
            const cx1 = k.lerp(apexX, bottomCenterX, e1);
            const hw0 = k.lerp(door.w / 2, LANE_HALF_WIDTH, e0);
            const hw1 = k.lerp(door.w / 2, LANE_HALF_WIDTH, e1);

            const opacity = isSelected ? k.lerp(0.02, 0.16, e1) : k.lerp(0.01, 0.06, e1);

            k.drawRect({
              width: hw0 + hw1,
              height: y1 - y0 + 1,
              pos: k.vec2((cx0 + cx1) / 2, (y0 + y1) / 2),
              anchor: "center",
              color: surfaceColor,
              opacity,
            });
          }

          const leftBottomX = bottomCenterX - LANE_HALF_WIDTH;
          const rightBottomX = bottomCenterX + LANE_HALF_WIDTH;
          const leftTop = k.vec2(apexX - door.w / 2, HORIZON_Y);
          const rightTop = k.vec2(apexX + door.w / 2, HORIZON_Y);

          k.drawLine({ p1: leftTop, p2: k.vec2(leftBottomX, screenH), color: edgeColor, width: edgeWidth, opacity: edgeOpacity });
          k.drawLine({ p1: rightTop, p2: k.vec2(rightBottomX, screenH), color: edgeColor, width: edgeWidth, opacity: edgeOpacity });

          if (isSelected) {
            k.drawLine({ p1: leftTop, p2: k.vec2(leftBottomX, screenH), color: edgeColor, width: edgeWidth + 5, opacity: 0.15 });
            k.drawLine({ p1: rightTop, p2: k.vec2(rightBottomX, screenH), color: edgeColor, width: edgeWidth + 5, opacity: 0.15 });
          }

          if (isSelected) {
            const dashCount = 10;
            for (let i = 0; i < dashCount; i++) {
              if (i % 2 === 1) continue; 
              const t0 = i / dashCount;
              const t1 = (i + 0.55) / dashCount;
              const e0 = Math.pow(t0, 1.6);
              const e1 = Math.pow(t1, 1.6);

              const y0 = k.lerp(HORIZON_Y, screenH, e0);
              const y1 = k.lerp(HORIZON_Y, screenH, e1);
              const cx0 = k.lerp(apexX, bottomCenterX, e0);
              const cx1 = k.lerp(apexX, bottomCenterX, e1);

              k.drawLine({
                p1: k.vec2(cx0, y0),
                p2: k.vec2(cx1, y1),
                color: k.rgb(255, 255, 255),
                width: k.lerp(1, 3, e1),
                opacity: k.lerp(0.2, 0.8, e1),
              });
            }
          }
        });
      }

      function drawFloorScanlines(screenW, screenH, dt) {
        gridOffset = (gridOffset + dt * 24) % 40;

        for (let j = 0; j < 12; j++) {
          const ratio = Math.pow((j + gridOffset / 40) / 12, 3);
          const y = HORIZON_Y + ratio * (screenH - HORIZON_Y);
          const alpha = Math.floor(ratio * 70);

          k.drawLine({
            p1: k.vec2(0, y),
            p2: k.vec2(screenW, y),
            color: k.rgb(alpha, alpha, alpha + 30),
            width: 1,
          });
        }
      }

      function drawHallwayFraming(screenW) {
        k.drawLine({ p1: k.vec2(0, 0), p2: k.vec2(150, HORIZON_Y), color: k.rgb(25, 25, 40), width: 2 });
        k.drawLine({
          p1: k.vec2(screenW, 0),
          p2: k.vec2(screenW - 150, HORIZON_Y),
          color: k.rgb(25, 25, 40),
          width: 2,
        });
      }

      function drawDoors(dt) {
        DOORS.forEach((door) => {
          const isSelected = door.id === selectedIndex;
          const target = isSelected ? SCALE_SELECTED : SCALE_IDLE;

          doorScale[door.id] = k.lerp(doorScale[door.id], target, Math.min(1, dt * SCALE_LERP_SPEED));

          const scale = doorScale[door.id];
          const activeW = door.w * scale;
          const activeH = door.h * scale;

          // Draw the doorway's glowing inner chamber (behind the sliding panels)
          k.drawRect({
            width: activeW,
            height: activeH,
            pos: k.vec2(door.x, door.y),
            anchor: "bot",
            color: door.color,
            opacity: isSelected ? (0.05 + doorOpenProgress * 0.4) : 0.02,
          });

          // Draw split-sliding elevator doors if selected, else static panels
          const curOpen = isSelected ? doorOpenProgress : 0;
          const panelW = activeW / 2;

          // LEFT SLIDING PANEL
          k.drawRect({
            width: panelW,
            height: activeH,
            pos: k.vec2(door.x - (panelW * curOpen), door.y),
            anchor: "botright", // Snaps flush to the center of the door frame
            color: k.rgb(10, 10, 15),
            outline: {
              color: isSelected ? door.color : k.rgb(40, 40, 55),
              width: isSelected ? 3 : 2,
            }
          });

          // RIGHT SLIDING PANEL
          k.drawRect({
            width: panelW,
            height: activeH,
            pos: k.vec2(door.x + (panelW * curOpen), door.y),
            anchor: "botleft",  // Snaps flush to the center of the door frame
            color: k.rgb(10, 10, 15),
            outline: {
              color: isSelected ? door.color : k.rgb(40, 40, 55),
              width: isSelected ? 3 : 2,
            }
          });

          // Outer frame outline (doesn't slide; holds the structure)
          k.drawRect({
            width: activeW,
            height: activeH,
            pos: k.vec2(door.x, door.y),
            anchor: "bot",
            fill: false,
            outline: {
              color: isSelected ? door.color : k.rgb(25, 25, 35),
              width: isSelected ? 4 : 1,
            },
          });

          // Door handles (only visible when door is mostly closed)
          if (curOpen < 0.8) {
            const handleOpacity = 1 - curOpen;
            k.drawCircle({
              pos: k.vec2(door.x - 4 - (panelW * curOpen), door.y - activeH / 2),
              radius: isSelected ? 3 : 2,
              color: isSelected ? door.color : k.rgb(50, 50, 60),
              opacity: handleOpacity,
            });
            k.drawCircle({
              pos: k.vec2(door.x + 4 + (panelW * curOpen), door.y - activeH / 2),
              radius: isSelected ? 3 : 2,
              color: isSelected ? door.color : k.rgb(50, 50, 60),
              opacity: handleOpacity,
            });
          }

          // Labels
          if (isSelected) {
            k.drawText({
              text: `[ ${door.title} ]`,
              pos: k.vec2(door.x, door.y - activeH - 25),
              anchor: "center",
              size: 16,
              color: door.color,
            });

            // Display "OPEN" command icon if ready
            if (doorState === "idle") {
              const bounce = Math.sin(k.time() * 8) * 5;
              k.drawText({
                text: "▼",
                pos: k.vec2(door.x, door.y - activeH - 45 + bounce),
                anchor: "center",
                size: 14,
                color: door.color,
              });
            }
          } else {
            k.drawText({
              text: door.title,
              pos: k.vec2(door.x, door.y - activeH - 15),
              anchor: "center",
              size: 11,
              color: k.rgb(100, 100, 120),
            });
          }
        });
      }

      function selectPrev() {
        if (doorState !== "idle" || !canInput) return;
        selectedIndex = (selectedIndex - 1 + DOORS.length) % DOORS.length;
        playBeep();
      }

      function selectNext() {
        if (doorState !== "idle" || !canInput) return;
        selectedIndex = (selectedIndex + 1) % DOORS.length;
        playBeep();
      }

      k.onKeyPress("left", selectPrev);
      k.onKeyPress("a", selectPrev);
      k.onKeyPress("right", selectNext);
      k.onKeyPress("d", selectNext);

      k.onKeyPress("space", () => {
        if (!canInput) return;
        if (doorState === "idle") startDoorOpening();
        else if (doorState === "room") startZoomOut();
      });

      window.closeRoom = function () {
        if (doorState === "room") startZoomOut();
      };

      window.addEventListener("keydown", (e) => {
        if (doorState !== "room") return;
        if (e.key === " " || e.code === "Space" || e.key === "Escape") {
          e.preventDefault();
          startZoomOut();
        }
      });
    });

    k.go("main");
  </script>
</body>
</html>
